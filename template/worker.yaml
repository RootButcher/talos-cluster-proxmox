machine:
  install:
    image: ${install_image}
    extraKernelArgs:
      - "talos.logging.kernel=tcp://10.0.11.105:5044/"
  logging:
    destinations:
      - endpoint: "tcp://10.0.11.105:5514/"
        format: json_lines
  kubelet:
    extraMounts:
      - destination: /etc/iscsi
        type: bind
        source: /var/etc/iscsi
        options:
          - bind
          - rshared
          - rw
  network:
    hostname: ${hostname}
    interfaces:
      - deviceSelector:
          physical: true
        dhcp: true
cluster:
  network:
    cni:
      name: none
  proxy:
    disabled: true