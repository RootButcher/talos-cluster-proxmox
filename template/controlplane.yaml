machine:
  install:
    image: ${install_image}
  logging:
    destinations:
      - endpoint: "tcp://10.0.11.105:5514/"
        format: json_lines
  kubelet:
    extraMounts:
      - destination: /etc/iscsi
        type: bind
        source: /var/etc/iscsi
        options:
          - bind
          - rshared
          - rw
  network:
    hostname: ${hostname}
    nameservers:
      - ${nameserver}
    interfaces:
      - deviceSelector:
          physical: true
        addresses:
          - ${ip_address}
        routes:
          - network: 0.0.0.0/0
            gateway: ${gateway}
        vip:
          ip: ${vip}
cluster:
  allowSchedulingOnControlPlanes: false
  network:
    cni:
      name: none
  proxy:
    disabled: true